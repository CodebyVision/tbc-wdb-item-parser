<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri App</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="container">
      <h2>Export item_template SQL</h2>
      <form class="row" id="export-form">
        <input id="itemcache-path" placeholder="Path to itemcache.wdb" />
        <button type="button" id="browse-itemcache-btn">Browse .wdb</button>
        <input id="output-sql-path" placeholder="Output SQL path (item_template.sql)" />
        <button type="button" id="browse-output-btn">Browse output .sql</button>
        <button type="submit">Export</button>
      </form>
      <p id="export-msg"></p>
    </main>
  </body>
</html>
